<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Producto</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Crear Producto</h1>

    <form th:action="@{/productos/guardar}"
          th:object="${producto}"
          method="post"
          class="row g-3">

        <!-- Código -->
        <div class="col-md-6">
            <label for="codigo" class="form-label">Código</label>
            <input type="text" id="codigo"
                   th:field="*{codigo}"
                   class="form-control"
                   placeholder="Ingresa el código"
                   required>
        </div>

        <!-- Nombre -->
        <div class="col-md-6">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre"
                   th:field="*{nombre}"
                   class="form-control"
                   placeholder="Nombre del producto"
                   required>
        </div>

        <!-- Descripción -->
        <div class="col-md-12">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea id="descripcion"
                      th:field="*{descripcion}"
                      class="form-control"
                      rows="3"
                      placeholder="Descripción (opcional)"></textarea>
        </div>

        <!-- Unidad -->
        <div class="col-md-6">
            <label for="unidad" class="form-label">Unidad</label>
            <input type="text" id="unidad"
                   th:field="*{unidad}"
                   class="form-control"
                   placeholder="Unidad (ej. kg, u, lt)">
        </div>

        <!-- Activo -->
        <div class="col-md-12">
            <div class="form-check">
                <input type="checkbox" id="activo"
                       th:field="*{activo}"
                       class="form-check-input">
                <label for="activo" class="form-check-label">
                    Activo
                </label>
            </div>
        </div>

        <!-- Botón de guardar -->
        <div class="col-md-12 text-center">
            <button type="submit" class="btn btn-primary w-50">
                Guardar Producto
            </button>
        </div>

    </form>

    <!-- Botón de volver a la lista -->
    <div class="text-center mt-4">
        <a th:href="@{/productos}" class="btn btn-secondary">
            Volver a la lista de productos
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
